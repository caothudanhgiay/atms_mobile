# codemagic.yaml
workflows:
  # ============================================
  # Workflow 1: Deploy lên App Store
  # ============================================
  ios-appstore:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.32.5
      xcode: latest
      cocoapods: default
      groups:
        - apple_credentials  # Group chứa APP_STORE_CONNECT_* variables

      ios_signing:
        distribution_type: app_store  # Phải là app_store để publish lên App Store
        bundle_identifier: com.atms.loadweb

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
        - pattern: 'release/*'
          include: true

    scripts:
      # Bước 1: Cài Flutter dependencies
      - name: Get Flutter packages
        script: |
          cd atms
          flutter pub get

      # Bước 2: Set version và build number cố định
      # ⚠️ Mỗi lần release mới, tăng BUILD_NUMBER lên (phải > bản trước trên App Store)
      - name: Set version and build number
        script: |
          cd atms
          APP_VERSION="2.6.1"   # Version hiển thị trên App Store
          APP_BUILD="9"         # Build number (phải > 8 - bản cuối đã upload)
          echo "Building version: $APP_VERSION+$APP_BUILD"
          sed -i "s/^version: .*/version: $APP_VERSION+$APP_BUILD/" pubspec.yaml

      # Bước 3: Cài CocoaPods
      - name: Install CocoaPods dependencies
        script: |
          cd atms/ios
          pod install

      # Bước 4: Set up code signing tự động (App Store)
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.atms.loadweb" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      # Bước 5: Build IPA cho App Store
      - name: Build IPA for App Store
        script: |
          cd atms
          APP_VERSION="2.6.1"
          APP_BUILD="9"
          flutter build ipa \
            --release \
            --export-method app-store \
            --build-name=$APP_VERSION \
            --build-number=$APP_BUILD

    artifacts:
      - atms/build/ios/ipa/*.ipa

    publishing:
      # Publish tự động lên App Store Connect
      app_store_connect:
        auth: integration  # Dùng API key đã cấu hình trong Codemagic UI

        # ✅ Upload lên TestFlight để test trên iPhone trước khi lên App Store
        submit_to_testflight: true
        beta_groups:
          - "atms_test"  # Tên group trong TestFlight (App Store Connect)

        # ✅ Bỏ comment dòng dưới khi muốn submit lên App Store để Apple review
        # submit_to_app_store: true

      email:
        recipients:
          - your-email@example.com  # Thay bằng email của bạn
        notify:
          success: true
          failure: true
