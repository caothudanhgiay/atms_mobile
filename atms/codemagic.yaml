# codemagic.yaml
workflows:
  ios-build:
    name: iOS Ad Hoc Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.32.5  # Khớp với .fvmrc
      xcode: latest
      cocoapods: default

      # Apple API Key cho Automatic Code Signing
      # Cấu hình trong Codemagic UI → Settings → Environment variables
      # Hoặc khai báo trực tiếp (không khuyến khích vì bảo mật)
      groups:
        - apple_credentials  # Group chứa APP_STORE_CONNECT_*

      ios_signing:
        distribution_type: ad_hoc  # Ad Hoc để cài lên iPhone test
        bundle_identifier: com.atms.loadweb

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
        - pattern: 'release/*'
          include: true
      # Hoặc trigger thủ công từ Dashboard

    scripts:
      # Bước 1: Cài dependencies
      - name: Get Flutter packages
        script: |
          cd atms
          flutter pub get

      # Bước 2: Cài CocoaPods
      - name: Install CocoaPods dependencies
        script: |
          cd atms/ios
          pod install

      # Bước 3: Set up code signing (Automatic)
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.atms.loadweb" \
            --type IOS_APP_ADHOC \
            --create
          keychain add-certificates
          xcode-project use-profiles

      # Bước 4: Build IPA
      - name: Build IPA
        script: |
          cd atms
          flutter build ipa \
            --release \
            --export-method ad-hoc

    artifacts:
      # File IPA sẽ được lưu ở đây sau khi build xong
      - atms/build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - your-email@example.com  # Thay bằng email của bạn
        notify:
          success: true
          failure: true
